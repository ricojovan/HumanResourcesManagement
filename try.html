
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.5.1/chart.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>

        section {
            background-color: #383636;
            height: 100vh;
    width: 100%;  
        }
nav {
    position: fixed;
    display: flex;
    width: 100%;
    top: 0;
    right: 0;
    justify-content: space-between;
    padding: 5px 5%;
    border-bottom: 1px solid transparent;
    align-items: center;
    background-color: transparent;
    transition: all .45s ease;
}
nav.sticky{
    background-color: #221f1f93;
    border-bottom: 1px solid #383636;
    padding: 0px 10%;
}
.logo {
    display: flex;
    cursor: pointer;
    height: 50px;
}
#menu-icon {
    font-size: 35px;
    color:#ffffff;
    z-index: 10001;
    cursor: pointer;
    margin-left: 25px;
    display: none;
}
.navlist {
    display: flex;
}
.navlist li {
    list-style: none;
    margin: 0 15px;
}
.navlist li a {
    font-size: 20px;
    color: rgb(255, 255, 255);
    letter-spacing: 3px;
    text-decoration: none;
    transition: all .45s ease;
}
.navlist li a:hover {
    color: white;
}
.navlist a.active {
    color: white;
}


    </style>
</head>
<body>
    <nav>
        <div class="placeholder"></div>
        <ul class="navlist">
        <li><a href="#dashboard" class="active">Dashboard</a></li>
            <li><a href="#product_list">Product List</a></li>
            <li><a href="#skills">Inventory History</a></li>
        </ul>
    </nav>

    <script>const nav = document.querySelector("nav");
        window.addEventListener("scroll", function(){
            nav.classList.toggle("sticky", window.scrollY > 100);
        });</script>
</body>
</html>
